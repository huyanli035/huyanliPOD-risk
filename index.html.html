<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老年髋部骨折患者术后谵妄(POD)风险计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; max-width: 1200px; margin: 30px auto; padding: 25px; background-color: #f8f9fa; }
        h2 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .desc { color: #666; margin-bottom: 25px; line-height: 1.8; font-size: 14px; }
        .feature-container { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .feature-column { width: 48%; }
        .feature-group { margin: 18px 0; display: flex; align-items: center; }
        label { width: 280px; font-size: 15px; color: #333; }
        input { padding: 8px 12px; width: 240px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.1); }
        button { padding: 12px 30px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background-color: #2980b9; }
        #result { margin-top: 25px; padding: 20px; border-radius: 6px; background-color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .score { font-size: 18px; font-weight: bold; color: #e74c3c; margin-bottom: 10px; }
        .level { font-size: 16px; margin-bottom: 8px; }
        .note { font-size: 13px; color: #999; line-height: 1.5; }
    </style>
</head>
<body>
    <h2>老年髋部骨折患者术后谵妄(POD)风险计算器</h2>
    <p class="desc">基于SHAP特征重要性构建的风险评分工具（数值越大，POD发生风险越高）<br>
    说明：二分类特征填1(异常/是)/0(正常/否)；ASA分级填写1-5，后台将≤3记为0，≥4记为1。连续特征填实际测量值，其中：术前等待时长的单位为天；手术时长的单位为小时；术中出血量的单位为毫升。</p>
    <div class="feature-container">
        <div class="feature-column">
            <div class="feature-group">
                <label for="age">年龄：</label>
                <input type="number" id="age" min="0" step="any" value="0">
            </div>
            <div class="feature-group">
                <label for="intraop_hypo">术中低血压(是=1/否=0)：</label>
                <input type="number" id="intraop_hypo" min="0" step="any" value="0">
            </div>
            <div class="feature-group">
                <label for="asa">ASA分级(1-5)：</label>
                <input type="number" id="asa" min="1" max="5" step="1" value="1">
            </div>
            <div class="feature-group">
                <label for="cci">CCI评分：</label>
                <input type="number" id="cci" min="0" step="any" value="0">
            </div>
            <div class="feature-group">
                <label for="post_icu">术后进入ICU(是=1/否=0)：</label>
                <input type="number" id="post_icu" min="0" step="any" value="0">
            </div>
            <div class="feature-group">
                <label for="op_duration">手术时长(小时)：</label>
                <input type="number" id="op_duration" min="0" step="any" value="0">
            </div>
            <div class="feature-group">
                <label for="intraop_hypoxia">术中低氧血症(是=1/否=0)：</label>
                <input type="number" id="intraop_hypoxia" min="0" step="any" value="0">
            </div>
        </div>
        <div class="feature-column">
            <div class="feature-group">
                <label for="preop_wait">术前等待时长(天)：</label>
                <input type="number" id="preop_wait" min="0" step="any" value="0">
            </div>
            <div class="feature-group">
                <label for="blood_loss">术中出血量(ml)：</label>
                <input type="number" id="blood_loss" min="0" step="any" value="0">
            </div>
            <div class="feature-group">
                <label for="hypernatremia">高钠血症(是=1/否=0)：</label>
                <input type="number" id="hypernatremia" min="0" step="any" value="0">
            </div>
            <div class="feature-group">
                <label for="hb">血红蛋白浓度(正常0/异常1)：</label>
                <input type="number" id="hb" min="0" max="1" step="1" value="0">
            </div>
            <div class="feature-group">
                <label for="alb">白蛋白浓度(正常0/异常1)：</label>
                <input type="number" id="alb" min="0" max="1" step="1" value="0">
            </div>
            <div class="feature-group">
                <label for="intraop_transfusion">术中输血(是=1/否=0)：</label>
                <input type="number" id="intraop_transfusion" min="0" step="any" value="0">
            </div>
        </div>
    </div>
    <button onclick="calcRisk()">计算POD风险评分</button>
    <div id="result"></div>
<script>
function calcRisk() {
  let total = 0;
  const max_total = 827.35;
  let asa_val = +document.getElementById("asa").value || 1;
  let asa_bin = asa_val > 3 ? 1 : 0;
  let age = +document.getElementById("age").value || 0;
  let intraop_hypo = +document.getElementById("intraop_hypo").value || 0;
  let cci = +document.getElementById("cci").value || 0;
  let post_icu = +document.getElementById("post_icu").value || 0;
  let op_duration = +document.getElementById("op_duration").value || 0;
  let intraop_hypoxia = +document.getElementById("intraop_hypoxia").value || 0;
  let preop_wait = +document.getElementById("preop_wait").value || 0;
  let blood_loss = +document.getElementById("blood_loss").value || 0;
  let hypernatremia = +document.getElementById("hypernatremia").value || 0;
  let hb = +document.getElementById("hb").value || 0;
  let alb = +document.getElementById("alb").value || 0;
  let intraop_transfusion = +document.getElementById("intraop_transfusion").value || 0;
  total = age*0.78
        + intraop_hypo*0.76
        + asa_bin*0.68
        + cci*0.60
        + post_icu*0.56
        + op_duration*0.53
        + intraop_hypoxia*0.51
        + preop_wait*0.49
        + blood_loss*0.47
        + hypernatremia*0.39
        + hb*0.38
        + alb*0.31
        + intraop_transfusion*0.22;
  let norm = (total / max_total).toFixed(4);
  let level = norm < 0.2 ? "低风险" : norm < 0.5 ? "中风险" : "高风险";
  let color = norm < 0.2 ? "#27ae60" : norm < 0.5 ? "#f39c12" : "#e74c3c";
  document.getElementById("result").innerHTML = `
    <div class="score">总风险评分：${total.toFixed(2)}</div>
    <div class="level" style="color:${color}">归一化评分：${norm}（${level}）</div>
    <div class="note">
      注：仅科研参考；<br>
      ASA分级已后台二值化；术前等待时长单位为天；Hb/Alb为0(正常)/1(异常)
    </div>`;
}
</script>
</body>
</html>
